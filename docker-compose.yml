version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: TimescaleDb
      POSTGRES_USER: TimescaleWebAPI
      POSTGRES_PASSWORD: Password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U TimescaleWebAPI -d TimescaleDb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./WebAPI
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:80"
      ConnectionStrings__DefaultConnection: "Host=db;Database=TimescaleDb;Username=TimescaleWebAPI;Password=Password"
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
